name: Receipts check (diagnostic, one-off)

# ONE-OFF diagnostics for "verify the receipts denominator before locking
# the basis" (see TASKreceiptsdenominator.md): scripts/receipts_check.py
# (gross-vs-net field check, run before the treasury.py fix) and
# scripts/basis_recheck.py (full matrix re-run after the fix). Neither is
# part of the build — findings go into STATUS.md / docs/review/ by hand.
# This workflow and both scripts are removed once the findings are recorded.
on:
  workflow_dispatch: {}
  push:
    branches: [claude/new-session-ldotj8]
    paths:
      - "scripts/receipts_check.py"
      - "scripts/basis_recheck.py"
      - ".github/workflows/receipts-check.yml"

permissions:
  contents: read

jobs:
  receipts-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run receipts check (gross vs net field check)
        working-directory: scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python receipts_check.py

      - name: Run basis re-check (full matrix, corrected basis)
        working-directory: scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python basis_recheck.py
