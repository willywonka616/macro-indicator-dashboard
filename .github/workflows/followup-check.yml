name: Follow-up check (diagnostic, one-off)

# ONE-OFF diagnostic, follow-up to STATUS.md §14: (1) a properly-dated
# Mar-2025-vs-today matrix pair (scripts/dated_matrix_check.py), (2) an
# IMF-codelist-driven direct query for PGOLD's actual latest observation
# (scripts/gold_imf_codelist_check.py). Neither is part of the build —
# findings go into STATUS.md / docs/review/ by hand, and both scripts and
# this workflow are removed once findings are recorded.
on:
  workflow_dispatch: {}
  push:
    branches: [claude/new-session-ldotj8]
    paths:
      - "scripts/dated_matrix_check.py"
      - "scripts/gold_imf_codelist_check.py"
      - ".github/workflows/followup-check.yml"

permissions:
  contents: read

jobs:
  followup-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run dated matrix check
        working-directory: scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python dated_matrix_check.py

      - name: Run gold IMF codelist check
        working-directory: scripts
        run: python gold_imf_codelist_check.py
