name: Remaining issues check (diagnostic, one-off)

# ONE-OFF diagnostic for TASKremainingissues.md items 1, 3, 4: drift matrix
# on the corrected receipts basis, gold-staleness root cause (IMF direct vs
# DBnomics mirror), and the total-debt "other debt" hypothesis. Runs
# scripts/remaining_issues_check.py, which is not part of the build and
# ships nothing on its own — findings go into STATUS.md / docs/review/ by
# hand. This workflow and the script are removed once findings are recorded.
on:
  workflow_dispatch: {}
  push:
    branches: [claude/new-session-ldotj8]
    paths:
      - "scripts/remaining_issues_check.py"
      - "scripts/gold_imf_direct_check.py"
      - ".github/workflows/remaining-issues-check.yml"

permissions:
  contents: read

jobs:
  remaining-issues-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run remaining-issues check
        working-directory: scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python remaining_issues_check.py

      - name: Run gold IMF-direct follow-up check
        working-directory: scripts
        run: python gold_imf_direct_check.py
